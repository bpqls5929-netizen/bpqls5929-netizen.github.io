<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Yebin Village</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    </head>

    <body>

        <!-- START SCREEN -->
        
        <section class="start-screen" id="start">
            <h1>WELCOME TO</h1>
            <h2>YEBIN VILLAGE</h2>

            <p>Yebin's Personal Website</p>
            
            <button class="start-btn" onclick="enterVillage()">
            ENTER VILLAGE
            </button>

        </section>

        <!-- VILLAGE MAP -->

        <section class="map-section" id="map">
        
            <div class="map-all">
                <img src="images/village-map.png" alt="Yebin Village Map">
                    <a class="spot-about" href="about.html" title="About Me">About Me</a>
                    <a class="spot-photo" href="photos.html">Photo Studio</a>
                    <a class="spot-music" href="music.html">Music Shop</a>
                    <a class="spot-park" href="hobbies.html">Park(Hobbies)</a>
                    <a class="spot-mailbox" href="contact.html">MailBox</a>

                <img src="images/character.png" class="character">



                <button class="back-btn-to-start" onclick="backtomain()">
                <img src="images/EXIT.png" class="EXIT" alt="뒤로가기">
                </button>
                <button onclick="toggleSound(this)">
                    <img src="images/soundon.png" class="soundoff" alt="소리설정">
                </button>

                <audio id="bgm" src="sounds/bgm.mp3" loop></audio>

            </div>
        </section>

        <script>
            const audio = document.getElementById("bgm");
            let started = false;

            function toggleSound(button) {
                const img = button.querySelector("img");

                if (!started) {
                    audio.muted = false;
                    audio.play()
                    started=true;
                    img.src ="images/soundon.png";
                    return;
                }

                audio.muted = !audio.muted;
                img.src = audio.muted ? "images/soundoff.png" : "images/soundon.png";
            }

            function enterVillage(){
                document.getElementById("start").style.display="none";
                document.getElementById("map").style.display="flex";
                }
            
            function backtomain(){
                document.getElementById("start").style.display="flex";
                document.getElementById("map").style.display="none";
                }
            
                  // ⭐ 이거 추가
                    window.onload = function(){
                    if(window.location.hash === "#map"){
                     document.getElementById("start").style.display="none";
                        document.getElementById("map").style.display="flex";
                    }
                }

        </script>


</body>
</html>
