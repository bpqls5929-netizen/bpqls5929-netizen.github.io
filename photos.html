<!DOCTYPE html>
<html lang="ko">

<head>

<body class="photos-page">

<div class="profile-section">

</div>

<!-- 기존 grid 그대로 -->
<div class="photo-grid">

        <!-- ⭐ 이거 반드시 필요 -->
        <div class="photo-grid">
    
            <div class="photo-card no-label">
                <img src="images/photo1.jpg">
                <div class="photo-label">
                
                </div>
            </div>
    
            <div class="photo-card no-label">
                <img src="images/photo2.jpg">

                    <p class="title">URBAN</p>
                    <p class="desc">도시의 감성과 풍경</p>
                </div>
            </div>
    
            <div class="photo-card no-label">
                <img src="images/photo3.jpg">

                    <p class="desc">카페에서의 여유로운 시간</p>

            </div>
    
            <div class="photo-card">
                <img src="images/photo4.jpg">

            </div>

                <img src="images/photo5.jpg">

                </div>
            </div>
    
            <div class="photo-card">
                <img src="images/photo6.jpg">
                <div class="photo-label">
                    <p class="title">ACRYLIC PAINTING</p>
                    <p class="desc">아크릴 물감으로 그림을 자주 그려요.<br>
                         언제든 다른 작품들도 보여드릴게요!</p>
                </div>
            </div>
    
        </div>
